<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FondAction</title>

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            padding:0;
            font-family:Arial,sans-serif;
            background:#f4f7fb;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .coming-soon-card{
            width:90%;
            max-width:420px;
            background:white;
            border-radius:28px;
            padding:40px 28px;
            text-align:center;
            box-shadow:0 20px 40px rgba(15,23,42,0.08);
        }

        .coming-badge{
            display:inline-block;
            background:#2563eb;
            color:white;
            padding:8px 16px;
            border-radius:999px;
            font-size:13px;
            font-weight:bold;
            margin-bottom:18px;
        }

        h1{
            margin:0 0 16px;
            font-size:32px;
            color:#111827;
        }

        p{
            margin:0;
            color:#64748b;
            line-height:1.8;
            font-size:15px;
        }
    </style>
</head>
<body>

    <div class="coming-soon-card">
        <div class="coming-badge">
            FondAction
        </div>

        <h1>Bientôt disponible</h1>

        <p>
            Cette fonctionnalité est actuellement en préparation.
            Nous travaillons pour vous offrir une expérience moderne,
            utile et accessible à toute la communauté.
        </p>
    </div>

</body>
</html>
