<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une publication</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            color: #111827;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #111827;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input[type="file"] {
            padding: 8px;
        }

        .btn {
            display: inline-block;
            padding: 14px 18px;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-secondary {
            background: #374151;
            color: white;
            margin-right: 10px;
        }

        .actions {
            margin-top: 20px;
        }

        .hint {
            font-size: 13px;
            color: #6b7280;
            margin-top: 5px;
        }

        .preview {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
        }

        .preview img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <h1>Créer une publication</h1>
        <p class="subtitle">
            Publiez une information visible par tous les membres.
        </p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Titre -->
            <div class="form-group">
                <label>Titre</label>
                <input type="text" name="title" required placeholder="Ex : Nouvelle opportunité pour les membres">
            </div>

            <!-- Contenu -->
            <div class="form-group">
                <label>Contenu</label>
                <textarea name="content" required placeholder="Écris ici ton message..."></textarea>
            </div>

            <!-- Image -->
            <div class="form-group">
                <label>Image (optionnelle)</label>
                <input type="file" name="image" accept="image/*" onchange="previewImage(event)">
                <div class="hint">Formats autorisés : JPG, PNG</div>
            </div>

            <!-- Vidéo -->
            <div class="form-group">
                <label>Lien vidéo YouTube (optionnel)</label>
                <input type="url" name="video_url" placeholder="https://youtu.be/...">
                <div class="hint">
                    Colle simplement le lien YouTube (pas besoin de embed)
                </div>
            </div>

            <!-- Aperçu -->
            <div class="preview" id="imagePreview" style="display:none;">
                <strong>Aperçu image :</strong>
                <img id="previewImg">
            </div>

            <!-- Actions -->
            <div class="actions">
                <a href="/admins/admins-hub/" class="btn btn-secondary">← Retour</a>
                <button type="submit" class="btn btn-primary">Publier</button>
            </div>

        </form>

    </div>
</div>

<script>
function previewImage(event) {
    const preview = document.getElementById('imagePreview');
    const img = document.getElementById('previewImg');

    img.src = URL.createObjectURL(event.target.files[0]);
    preview.style.display = 'block';
}
</script>

</body>
</html>
