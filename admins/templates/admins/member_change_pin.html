<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer le PIN</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff; /* 👉 fond blanc */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        /* 👉 CENTRAGE + STYLE ICÔNE */
        .icon {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 18px;
        }

        .icon svg {
            width: 42px;
            height: 42px;
            color: #2563eb; /* 👉 belle couleur bleue pro */
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            color: #111827;
        }

        .header p {
            margin-top: 8px;
            font-size: 14px;
            color: #6b7280;
        }

        .warning {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 13px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #16a34a;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #15803d;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
        }

        @media (max-width: 500px) {
            .container {
                margin: 20px;
                padding: 28px 22px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- 👉 ICÔNE CENTRÉE -->
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20.91 11.12C20.91 16.01 17.36 20.59 12.51 21.93C12.18 22.02 11.82 22.02 11.49 21.93C6.63996 20.59 3.08997 16.01 3.08997 11.12V6.72997C3.08997 5.90997 3.70998 4.97998 4.47998 4.66998L10.05 2.39001C11.3 1.88001 12.71 1.88001 13.96 2.39001L19.53 4.66998C20.29 4.97998 20.92 5.90997 20.92 6.72997L20.91 11.12Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M12 12.5C13.1046 12.5 14 11.6046 14 10.5C14 9.39543 13.1046 8.5 12 8.5C10.8954 8.5 10 9.39543 10 10.5C10 11.6046 10.8954 12.5 12 12.5Z" stroke="currentColor" stroke-width="1.5"></path>
                <path d="M12 12.5V15.5" stroke="currentColor" stroke-width="1.5"></path>
            </svg>
        </div>

        <div class="header">
            <h1>Changer votre PIN</h1>
            <p>Sécurisez votre compte avec un nouveau code personnel</p>
        </div>

        <div class="warning">
            ⚠️ Votre code PIN est strictement personnel. Ne le partagez avec personne.
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Nouveau PIN (5 chiffres)</label>
                <input type="password" name="new_pin" maxlength="5" placeholder="•••••" required>
            </div>

            <div class="form-group">
                <label>Confirmer le nouveau PIN</label>
                <input type="password" name="confirm_pin" maxlength="5" placeholder="•••••" required>
            </div>

            <button type="submit" class="btn">Valider</button>
        </form>

        

    </div>

</body>
</html>
