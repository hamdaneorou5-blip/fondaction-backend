<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer le PIN</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            color: #111827;
        }

        .header p {
            margin-top: 10px;
            font-size: 14px;
            color: #6b7280;
        }

        .icon {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .warning {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 13px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #16a34a;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #15803d;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
        }

        @media (max-width: 500px) {
            .container {
                margin: 20px;
                padding: 28px 22px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">
            <div class="icon">🔐</div>
            <h1>Changer votre PIN</h1>
            <p>Sécurisez votre compte avec un nouveau code personnel</p>
        </div>

        <div class="warning">
            ⚠️ Vous devez définir un nouveau PIN avant d’accéder à votre espace membre.
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Nouveau PIN (5 chiffres)</label>
                <input type="password" name="new_pin" maxlength="5" placeholder="•••••" required>
            </div>

            <div class="form-group">
                <label>Confirmer le nouveau PIN</label>
                <input type="password" name="confirm_pin" maxlength="5" placeholder="•••••" required>
            </div>

            <button type="submit" class="btn">Valider</button>
        </form>

        <div class="footer">
            🔒 Assurez-vous de garder votre PIN confidentiel
        </div>

    </div>

</body>
</html>
