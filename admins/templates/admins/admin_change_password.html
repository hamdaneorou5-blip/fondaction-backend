<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer mot de passe admin</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
            color: #111827;
            text-align: center;
        }

        p {
            text-align: center;
            color: #6b7280;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            margin-bottom: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #16a34a;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔐 Changer votre mot de passe</h1>
    <p>Vous devez définir un nouveau mot de passe avant d’accéder au dashboard.</p>

    <form method="POST">
        {% csrf_token %}

        <label>Nouveau mot de passe</label>
        <input type="password" name="new_password" required>

        <label>Confirmer le mot de passe</label>
        <input type="password" name="confirm_password" required>

        <button type="submit" class="btn">Valider</button>
    </form>
</div>

</body>
</html>
